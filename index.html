    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.4;
            padding: 0;
        }

        .main {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            padding: 0 20px;
        }

        .card {
            background: white;
            padding: 20px 0 24px 0;
            text-align: center;
        }
        
        .join-btn {
            background: linear-gradient(135deg, #0088cc 0%, #00a2e8 100%);
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 1.4rem;
            font-weight: 700;
            color: white;
            cursor: pointer;
            width: auto;
            min-width: 220px;
            margin: 0 0 20px 0;
            transition: all 0.2s ease;
            box-shadow: 0 0 0 0 rgba(0, 136, 204, 0.5);
            animation: btnGlowPulse 1.5s ease-in-out infinite;
        }

        .join-btn i {
            font-size: 1.5rem;
        }

        .join-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(0, 136, 204, 0.7);
        }

        .join-btn:active {
            transform: scale(0.97);
            transition: 0.05s;
        }

        @keyframes btnGlowPulse {
            0% {
                box-shadow: 0 0 0 0 rgba(0, 136, 204, 0.4);
            }
            70% {
                box-shadow: 0 0 0 12px rgba(0, 136, 204, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(0, 136, 204, 0);
            }
        }

        
        .pointer-icon {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin: 0 0 20px 0;
            animation: fingerBounce 0.8s ease-in-out infinite;
        }

        .pointer-icon i {
            font-size: 1.8rem;
            color: #0088cc;
        }

        .pointer-icon span {
            font-size: 0.95rem;
            font-weight: 500;
            color: #1e2a3e;
        }

        @keyframes fingerBounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-6px);
            }
        }

        /* গ্রুপের নাম ও সদস্য সংখ্যা */
        .group-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: #0a0c12;
            margin: 10px 0 8px 0;
            letter-spacing: -0.3px;
        }

        .member-badge {
            background: #f0f2f5;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #1e2a3e;
            margin-bottom: 24px;
        }

        .member-badge i {
            color: #0088cc;
        }
        
        .features {
            background: #f8fafd;
            border-radius: 28px;
            padding: 20px 16px;
            margin: 16px 0 28px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px 12px;
        }

        .feat-item {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 12px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #1e293b;
        }

        .feat-item i {
            font-size: 1.2rem;
            color: #0088cc;
            background: white;
            width: 36px;
            height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .feat-item span {
            display: inline-block;
            text-align: left;
            line-height: 1.3;
        }

        /* ফুটার */
        .footer {
            margin-top: 12px;
            padding-top: 18px;
            border-top: 1px solid #eef2f6;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 0.85rem;
            color: #5b6e8c;
        }

        .footer a {
            text-decoration: none;
            background: #eef3fc;
            padding: 8px 18px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #0088cc;
            font-weight: 600;
            transition: 0.2s;
        }

        .footer a:active {
            background: #e2eaf3;
            transform: scale(0.96);
        }

<body>
<div class="main">
    <div class="card">
    	 <div class="pointer-icon">
            <i class="fas fa-arrow-down"></i>
        </div>
        
        <button id="joinTelegramBtn" class="join-btn">
            <i class="fab fa-telegram-plane"></i> জয়েন গ্রুপ
        </button>
        
        <div class="pointer-icon">
            <i class="fas fa-hand-pointer"></i>
        </div>
        
        <div class="group-title">
            ARIYANS
        </div>
        <div class="member-badge">
            <i class="fas fa-users"></i> ৫,২০০+ সদস্য
        </div>
        
        <div class="features">
            <div class="feat-item">
                <i class="fas fa-chart-line"></i>
                <span>লাইভ ক্লাস</span>
            </div>
            <div class="feat-item">
                <i class="fas fa-clock"></i>
                <span>২৪/৭ আপডেট</span>
            </div>
            <div class="feat-item">
                <i class="fas fa-lock"></i>
                <span>ভিআইপি গ্রুপ</span>
            </div>
            <div class="feat-item">
                <i class="fas fa-gem"></i>
                <span>নতুন টিপস</span>
            </div>
        </div>
        
        <div class="footer">
            
            <a href="https://t.me/kdexupdate" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-telegram"></i> Ads By KDex
            </a>
        </div>
    </div>
</div>

<script>
(function() {
    const btn = document.getElementById('joinTelegramBtn');
    const TELEGRAM_URL = "https://t.me/+RyqOTZYeN-k5YzU1";

    if (!btn) return;

    function getFbp() {
        let match = document.cookie.match('_fbp=([^;]+)');
        return match ? match[1] : '';
    }

    function getFbc() {
        let urlParams = new URLSearchParams(window.location.search);
        let fbclid = urlParams.get('fbclid');
        if (fbclid) {
            return 'fb.1.' + Date.now() + '.' + fbclid;
        }
        let cookieMatch = document.cookie.match('_fbc=([^;]+)');
        return cookieMatch ? cookieMatch[1] : '';
    }

    btn.addEventListener('click', async function() {
        const eventId = 'Join_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
        const fbp = getFbp();
        const fbc = getFbc();

        // Meta Pixel Event
        if (typeof fbq === 'function') {
            fbq('trackCustom', 'Join', {
                action: 'click',
                event_id: eventId
            });
        }

        // TikTok Pixel Event
        if (typeof ttq === 'function') {
            ttq.track('CustomEvent', {
                event_name: 'Join',
                action: 'click',
                event_id: eventId
            });
        }

        // Meta CAPI (Server-side)
        try {
            await fetch('/api/track', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    eventId: eventId,
                    eventName: 'Join',
                    customData: { action: 'click', source: 'group_access' },
                    userData: { fbp: fbp, fbc: fbc }
                })
            });
        } catch (err) {
            console.warn('Meta CAPI error:', err);
        }

        // TikTok Events API (Server-side) - Optional
        try {
            await fetch('/api/tiktok-track', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    eventId: eventId,
                    eventName: 'Join',
                    customData: { action: 'click', source: 'group_access' },
                    userData: { ttp: fbp, ttclid: fbc }
                })
            });
        } catch (err) {
            console.warn('TikTok CAPI error:', err);
        }

        setTimeout(function() {
            window.open(TELEGRAM_URL, '_blank');
        }, 200);
    });
})();
</script>
</body>
</html>
